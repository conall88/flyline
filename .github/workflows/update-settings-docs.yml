name: Update Settings Documentation

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: update-settings-docs
  cancel-in-progress: false

jobs:
  update-settings-docs:
    name: Regenerate flyline --help text and update README
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build flyline library and extract help text
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          targets: extract-help-text
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      # flyline_help.txt, flyline_create_prompt_widget_animation_help.txt,
      # flyline_create_prompt_widget_mouse_mode_help.txt, and
      # flyline_create_prompt_widget_custom_help.txt are now in the project root (output of extract-help-text)
      - name: Update README between marker comments
        run: |
          python3 - <<'EOF'
          import pathlib

          def replace_between_markers(lines, start_marker, end_marker, replacement_lines):
              start = next(i for i, l in enumerate(lines) if l.strip() == start_marker)
              end = next(i for i, l in enumerate(lines) if l.strip() == end_marker)
              return lines[:start] + replacement_lines + lines[end + 1:]

          lines = pathlib.Path("README.md").read_text().splitlines(keepends=True)

          help_text = pathlib.Path("flyline_help.txt").read_text().rstrip("\n")
          lines = replace_between_markers(
              lines,
              "<!-- FLYLINE_HELP_START -->",
              "<!-- FLYLINE_HELP_END -->",
              ["<!-- FLYLINE_HELP_START -->\n", "```\n", *[l + "\n" for l in help_text.splitlines()], "```\n", "<!-- FLYLINE_HELP_END -->\n"],
          )

          create_anim_help_text = pathlib.Path("flyline_create_prompt_widget_animation_help.txt").read_text().rstrip("\n")
          lines = replace_between_markers(
              lines,
              "<!-- FLYLINE_CREATE_PROMPT_WIDGET_ANIMATION_HELP_START -->",
              "<!-- FLYLINE_CREATE_PROMPT_WIDGET_ANIMATION_HELP_END -->",
              ["<!-- FLYLINE_CREATE_PROMPT_WIDGET_ANIMATION_HELP_START -->\n", "```\n", *[l + "\n" for l in create_anim_help_text.splitlines()], "```\n", "<!-- FLYLINE_CREATE_PROMPT_WIDGET_ANIMATION_HELP_END -->\n"],
          )

          mouse_mode_help_text = pathlib.Path("flyline_create_prompt_widget_mouse_mode_help.txt").read_text().rstrip("\n")
          lines = replace_between_markers(
              lines,
              "<!-- FLYLINE_CREATE_PROMPT_WIDGET_MOUSE_MODE_HELP_START -->",
              "<!-- FLYLINE_CREATE_PROMPT_WIDGET_MOUSE_MODE_HELP_END -->",
              ["<!-- FLYLINE_CREATE_PROMPT_WIDGET_MOUSE_MODE_HELP_START -->\n", "```\n", *[l + "\n" for l in mouse_mode_help_text.splitlines()], "```\n", "<!-- FLYLINE_CREATE_PROMPT_WIDGET_MOUSE_MODE_HELP_END -->\n"],
          )

          custom_help_text = pathlib.Path("flyline_create_prompt_widget_custom_help.txt").read_text().rstrip("\n")
          lines = replace_between_markers(
              lines,
              "<!-- FLYLINE_CREATE_PROMPT_WIDGET_CUSTOM_HELP_START -->",
              "<!-- FLYLINE_CREATE_PROMPT_WIDGET_CUSTOM_HELP_END -->",
              ["<!-- FLYLINE_CREATE_PROMPT_WIDGET_CUSTOM_HELP_START -->\n", "```\n", *[l + "\n" for l in custom_help_text.splitlines()], "```\n", "<!-- FLYLINE_CREATE_PROMPT_WIDGET_CUSTOM_HELP_END -->\n"],
          )

          pathlib.Path("README.md").write_text("".join(lines))
          print("README.md updated")
          EOF

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B update-settings-docs
          git add README.md
          git diff --cached --quiet && echo "No changes to settings docs" && exit 0
          git commit -m "chore: update settings documentation from flyline --help"
          git push --force origin update-settings-docs
          gh pr create \
            --title "chore: update settings documentation" \
            --body "Automated PR to update the Settings section of the README from \`flyline --help\`." \
            --base master \
            --head update-settings-docs \
          || gh pr edit update-settings-docs \
            --title "chore: update settings documentation" \
            --body "Automated PR to update the Settings section of the README from \`flyline --help\`."
